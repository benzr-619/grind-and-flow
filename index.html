<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Grind &amp; Flow</title>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Grind &amp; Flow">
  <meta name="theme-color" content="#ece2cd">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-180.png">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
<!-- ── Auth overlay — visible until a session is confirmed ── -->
<div id="auth-overlay" style="display:none">
  <div class="auth-card">
    <div class="auth-wordmark">
      Grind <span class="auth-amp">&amp;</span> Flow
    </div>
    <div class="auth-tabs">
      <button class="auth-tab active" id="atab-in" onclick="Auth.showTab('signin')">Sign In</button>
      <button class="auth-tab"        id="atab-up" onclick="Auth.showTab('signup')">Create Account</button>
    </div>
    <div id="auth-form"><!-- rendered by Auth.js --></div>
    <div id="auth-message" class="auth-message" style="display:none"></div>
  </div>
</div>

<div id="app" style="display:none">

  <!-- ── Topbar ── -->
  <header class="topbar">
    <div class="topbar-left">
      <div class="wordmark">
        <span class="wordmark-text">Grind <span class="wordmark-amp">&amp;</span> Flow</span>
      </div>
      <span class="topbar-divider">|</span>
      <nav class="tab-group">
        <button class="tab active" id="tab-tasks"    onclick="App.switchView('tasks')">Tasks</button>
        <button class="tab"        id="tab-projects" onclick="App.switchView('projects')">Projects</button>
        <button class="tab"        id="tab-archive"  onclick="App.switchView('archive')">Archive</button>
      </nav>
    </div>
    <div class="topbar-right">
<button class="btn-icon" onclick="App.exportData()" title="Export backup">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      </button>
      <button class="btn-icon" onclick="App.importData()" title="Import backup">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      </button>
      <input type="file" id="import-file" accept=".json" style="display:none" onchange="App.onImportFile(event)" />
      <button class="btn-icon btn-logout" onclick="Auth.handleLogout()" title="Sign out">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
      </button>
    </div>
  </header>

  <!-- Save banner -->
  <div class="save-banner" id="save-banner" style="display:none">
    <span>Unsaved changes</span>
    <button class="save-now-btn" onclick="App.exportData()">Export ↓</button>
    <button class="banner-dismiss" onclick="App.dismissBanner()">✕</button>
  </div>

  <!-- ── Mobile capture bar — sticky below topbar, hidden on desktop ── -->
  <div class="mobile-capture-bar" id="mobile-capture-bar">
    <form class="mobile-capture-form" onsubmit="App.addMobileCapture(event)">
      <input type="text" id="mobile-capture-input" class="mobile-capture-input"
             placeholder="Capture a task…" autocomplete="off" />
      <button type="submit" class="mobile-capture-submit">Add</button>
    </form>
  </div>

  <!-- ── Mobile segmented toggle — hidden on desktop ── -->
  <div class="mobile-seg-bar" id="mobile-seg-bar">
    <div class="mobile-seg-ctrl">
      <button class="mobile-seg-btn active" id="seg-inbox" onclick="App.switchMobileTab('inbox')">Inbox</button>
      <button class="mobile-seg-btn"        id="seg-today" onclick="App.switchMobileTab('today')">Today</button>
    </div>
  </div>

  <!-- ── Mobile list panel — rendered by JS, hidden on desktop ── -->
  <div id="mobile-inbox" class="mobile-inbox"></div>

  <!-- ── Focus zone: doing row + timer track ── -->
  <div id="focus-zone" class="focus-zone">
    <section class="doing-section" id="doing-section">
      <!-- rendered by JS -->
    </section>

    <!-- ── Timer track ── -->
    <div class="timer-track" id="timer-track">
      <!-- rendered by JS -->
    </div>
  </div>

  <!-- ── Board ── -->
  <main class="board-section">
    <div class="board-head">
      <div class="board-head-left">
        <div class="topbar-date" id="topbar-date"></div>
        <h1 class="board-title" id="board-title">Tasks</h1>
      </div>
      <div class="board-actions" id="board-actions">
        <!-- rendered by JS -->
      </div>
    </div>
    <div id="board"></div>
  </main>

</div>
<div id="modal-root"></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="data.js"></script>
<script src="auth.js"></script>
<script src="app.js"></script>
</body>
</html>
