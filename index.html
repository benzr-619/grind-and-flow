<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Grind & Flow</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <header class="topbar">
      <div class="topbar-left">
        <div class="wordmark">G&amp;F</div>
        <div class="tab-group">
          <button class="tab active" id="tab-projects" onclick="App.switchView('projects')">Projects</button>
          <button class="tab" id="tab-tasks" onclick="App.switchView('tasks')">Tasks</button>
        </div>
        <div class="date-display" id="date-display"></div>
      </div>
      <div class="topbar-right">
        <button class="btn-icon" id="archive-btn" onclick="App.toggleArchive()" title="Archive">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 8v13H3V8"/><path d="M23 3H1v5h22V3z"/><path d="M10 12h4"/></svg>
        </button>
        <button class="btn-icon" id="search-btn" onclick="App.toggleSearch()" title="Search">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        </button>
        <button class="btn-ghost" id="ai-btn" onclick="App.toggleChat()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
          AI
          <span class="model-dot" id="model-dot"></span>
        </button>
        <button class="btn-primary" onclick="App.openNewModal()">+ <span id="add-label">Add project</span></button>
      </div>
    </header>

    <div class="search-bar-wrap" id="search-bar-wrap" style="display:none">
      <input class="search-bar" id="search-input" placeholder="Search projects and tasks..." oninput="App.onSearch(this.value)" />
      <button class="search-close" onclick="App.toggleSearch()">✕</button>
    </div>

    <div class="main-layout">
      <div class="board-wrap" id="board-wrap">
        <div class="board" id="board"></div>
      </div>
      <aside class="chat-panel" id="chat-panel">
        <div class="chat-header">
          <span class="chat-title">AI assistant</span>
          <button class="btn-icon" onclick="App.toggleChat()">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18M6 6l12 12"/></svg>
          </button>
        </div>
        <div class="chat-messages" id="chat-messages">
          <div class="msg system">LM Studio · llama 3.1 8B · localhost:1234</div>
          <div class="msg ai">Hey — I can see your full board including today's date. Ask me what to focus on, what's overdue, how to break down a project, or anything else.</div>
        </div>
        <div class="chat-footer">
          <div class="quick-prompts">
            <button class="qp" onclick="App.sendQuick('What should I focus on today?')">Focus today ↗</button>
            <button class="qp" onclick="App.sendQuick('What tasks have been sitting too long?')">Stale items ↗</button>
            <button class="qp" onclick="App.sendQuick('What is overdue or due this week?')">Due soon ↗</button>
            <button class="qp" onclick="App.sendQuick('Help me prioritize my Next tasks')">Prioritize ↗</button>
          </div>
          <div class="chat-input-row">
            <textarea class="chat-input" id="chat-input" placeholder="Ask about your tasks..." rows="1" onkeydown="App.handleChatKey(event)"></textarea>
            <button class="send-btn" onclick="App.sendChat()">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m22 2-7 20-4-9-9-4 20-7z"/><path d="M22 2 11 13"/></svg>
            </button>
          </div>
        </div>
      </aside>
    </div>
  </div>

  <div id="modal-root"></div>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
